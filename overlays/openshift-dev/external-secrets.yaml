apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: vault-backend
  namespace: openshell
  labels:
    app.kubernetes.io/part-of: openshell
spec:
  provider:
    vault:
      server: "http://vault.vault.svc.cluster.local:8200"
      path: "openshell"
      version: "v2"
      auth:
        tokenSecretRef:
          name: vault-token
          key: token
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: openshell-jwt-keys
  namespace: openshell
  labels:
    app.kubernetes.io/part-of: openshell
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-backend
    kind: SecretStore
  target:
    name: openshell-jwt-keys
    creationPolicy: Owner
  data:
    - secretKey: signing.pem
      remoteRef:
        key: jwt-keys
        property: signing_pem
    - secretKey: public.pem
      remoteRef:
        key: jwt-keys
        property: public_pem
    - secretKey: kid
      remoteRef:
        key: jwt-keys
        property: kid
