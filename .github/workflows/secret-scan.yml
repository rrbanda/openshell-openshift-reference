name: Secret Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan for secrets in diff
        run: |
          set -e
          VIOLATIONS=0

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            DIFF=$(git diff origin/main...HEAD | grep '^+' | grep -v '^+++' || true)
          else
            DIFF=$(git diff HEAD~1..HEAD | grep '^+' | grep -v '^+++' || true)
          fi

          if [ -z "$DIFF" ]; then
            echo "No added lines to scan."
            exit 0
          fi

          check() {
            local label="$1" pattern="$2"
            matches=$(echo "$DIFF" | grep -E "$pattern" 2>/dev/null | head -5) || true
            if [ -n "$matches" ]; then
              echo "::error::SECRET DETECTED [$label]"
              echo "$matches" | head -3
              VIOLATIONS=$((VIOLATIONS + 1))
            fi
          }

          check "AWS Access Key" "AKIA[0-9A-Z]{16}"
          check "AWS Secret Key" "(aws_secret_access_key|aws_secret_key).*[=:].*[A-Za-z0-9/+=]{40}"
          check "GitHub Token" "(ghp|gho|ghu|ghs|ghr)_[A-Za-z0-9_]{36,}"
          check "GitLab Token" "glpat-[A-Za-z0-9_-]{20,}"
          check "Private Key" "-----BEGIN.*PRIVATE KEY-----"
          check "OpenAI Key" "sk-[A-Za-z0-9_-]{20,}"
          check "Anthropic Key" "sk-ant-[A-Za-z0-9_-]{20,}"
          check "Slack Token" "xox[baprs]-[A-Za-z0-9-]{10,}"
          check "JWT Token" "eyJ[A-Za-z0-9_-]{10,}\.eyJ[A-Za-z0-9_-]{10,}\."
          check "Vault Token" "hvs\.[A-Za-z0-9_-]{20,}"
          check "DB URI with creds" "(postgres|mysql|mongodb|redis)://[^:]+:[^@]+@"
          check "Password assignment" "(password|passwd|pwd).*[=:].*['\"][^'\"]{8,}"

          if [ "$VIOLATIONS" -gt 0 ]; then
            echo ""
            echo "::error::$VIOLATIONS secret(s) detected. Fix before merging."
            exit 1
          fi

          echo "No secrets detected."
